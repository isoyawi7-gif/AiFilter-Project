<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project PNG Internet Filter - Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#001f3f,#005792,#00a8cc);
    overflow:hidden;
}

body::before{
    content:'';
    position:absolute;
    width:300px;
    height:300px;
    background:rgba(255,255,255,0.15);
    border-radius:50%;
    top:-100px;
    left:-100px;
}

body::after{
    content:'';
    position:absolute;
    width:400px;
    height:400px;
    background:rgba(255,255,255,0.1);
    border-radius:50%;
    bottom:-150px;
    right:-150px;
}

.login-container{
    position:relative;
    width:400px;
    padding:40px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    text-align:center;
    color:white;
}

.logo{
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;
}

.subtitle{
    margin-bottom:30px;
    opacity:0.8;
}

.input-group{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:10px;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:16px;
}

input::placeholder{
    color:rgba(255,255,255,0.7);
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00e676;
    transform:translateY(-2px);
}

.error{
    margin-top:15px;
    color:#ff5252;
    display:none;
}

.footer{
    margin-top:20px;
    font-size:12px;
    opacity:0.7;
}
</style>
</head>
<body>

<div class="login-container">

    <div class="logo">
        🌐 PROJECT PNG INTERNET FILTER
    </div>

    <div class="subtitle">
        Administrator Secure Login
    </div>

    <div class="input-group">
        <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-group">
        <input type="password" id="password" placeholder="Password">
    </div>

    <button onclick="login()">
        LOGIN
    </button>

    <div class="error" id="errorMsg">
        Invalid Username or Password
    </div>

    <div class="footer">
        Project PNG Internet Filter v1.0
    </div>

</div>

<script>

function login(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if(username === "Admin" && password === "Admin"){

        window.location.href = "Dashboard.html";

    }else{

        document.getElementById("errorMsg").style.display = "block";

    }
}

document.addEventListener("keypress", function(e){

    if(e.key === "Enter"){
        login();
    }

});

</script>

</body>
</html>
