<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNG AI Internet Filter System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b1220;
color:white;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111827;
position:fixed;
width:100%;
top:0;
z-index:10;
}

button{
padding:10px 15px;
border:none;
cursor:pointer;
border-radius:6px;
background:#06b6d4;
color:white;
}

button:hover{
background:#0891b2;
}

/* LAYOUT */
.container{
display:flex;
margin-top:60px;
}

/* SIDEBAR */
.sidebar{
width:220px;
height:100vh;
background:#111827;
padding:15px;
position:fixed;
}

.sidebar h2{
color:#06b6d4;
}

.sidebar div{
padding:10px;
cursor:pointer;
margin-top:10px;
border-radius:6px;
}

.sidebar div:hover{
background:#1f2937;
}

/* MAIN */
.main{
margin-left:240px;
padding:20px;
width:100%;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
}

/* FILTER BOX */
.filter{
background:#1e293b;
padding:15px;
margin-top:20px;
border-radius:10px;
}

input,select{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

/* TABLE */
table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
}

/* CHART GRID */
.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:15px;
margin-top:20px;
}

.box{
background:#1e293b;
padding:15px;
border-radius:10px;
}

</style>

</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
<div>PNG AI FILTER SYSTEM</div>
<button onclick="goHome()">🏠 Back Home</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>FILTER AI</h2>

<div onclick="showAll()">Dashboard</div>
<div onclick="filterProvince('Morobe')">Morobe</div>
<div onclick="filterProvince('NCD')">NCD</div>
<div onclick="filterProvince('Madang')">Madang</div>
<div onclick="filterProvince('Hela')">Hela</div>
<div onclick="filterProvince('ENB')">ENB</div>

</div>

<!-- MAIN -->
<div class="main">

<!-- CARDS -->
<div class="cards">
<div class="card">Users <h2>5,240</h2></div>
<div class="card">Active Sessions <h2>320</h2></div>
<div class="card">Blocked Sites <h2>12,940</h2></div>
<div class="card">AI Alerts <h2>18</h2></div>
</div>

<!-- FILTER -->
<div class="filter">
<h3>AI Search Filter</h3>

<select id="province">
<option>All Provinces</option>
<option>Morobe</option>
<option>NCD</option>
<option>Madang</option>
<option>Hela</option>
<option>ENB</option>
</select>

<input type="date" id="dateFilter">
<input type="time" id="timeFilter">

<button onclick="applyFilter()">Apply Filter</button>

</div>

<!-- TABLE -->
<div class="box">
<h3>Search Logs</h3>

<table>
<thead>
<tr>
<th>User</th>
<th>Province</th>
<th>Keyword</th>
<th>Date</th>
<th>Time</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

<!-- CHARTS -->
<div class="grid">

<div class="box">
<h3>Traffic Trend</h3>
<canvas id="lineChart"></canvas>
</div>

<div class="box">
<h3>Province Share</h3>
<canvas id="pieChart"></canvas>
</div>

</div>

<div class="box" style="margin-top:15px;">
<h3>Usage Overview</h3>
<canvas id="barChart"></canvas>
</div>

</div>

<script>

/* SAMPLE DATA */
let logs = [
{user:"User1",province:"Morobe",keyword:"facebook",date:"2026-06-06",time:"10:10"},
{user:"User2",province:"NCD",keyword:"youtube",date:"2026-06-06",time:"10:20"},
{user:"User3",province:"Hela",keyword:"vpn",date:"2026-06-05",time:"11:00"},
{user:"User4",province:"Madang",keyword:"google",date:"2026-06-05",time:"12:00"},
{user:"User5",province:"ENB",keyword:"tiktok",date:"2026-06-04",time:"13:30"},
];

function renderTable(data){
let t=document.getElementById("table");
t.innerHTML="";
data.forEach(d=>{
t.innerHTML+=`
<tr>
<td>${d.user}</td>
<td>${d.province}</td>
<td>${d.keyword}</td>
<td>${d.date}</td>
<td>${d.time}</td>
</tr>`;
});
}

renderTable(logs);

/* FILTER */
function applyFilter(){

let p=document.getElementById("province").value;
let d=document.getElementById("dateFilter").value;
let t=document.getElementById("timeFilter").value;

let filtered=logs.filter(x=>
(p==="All Provinces"||x.province===p) &&
(!d||x.date===d) &&
(!t||x.time===t)
);

renderTable(filtered);
}

/* QUICK PROVINCE FILTER */
function filterProvince(p){
document.getElementById("province").value=p;
applyFilter();
}

/* SHOW ALL */
function showAll(){
document.getElementById("province").value="All Provinces";
document.getElementById("dateFilter").value="";
document.getElementById("timeFilter").value="";
renderTable(logs);
}

/* BACK HOME */
function goHome(){
window.location.href="index.html";
}

/* LINE CHART */
new Chart(document.getElementById("lineChart"),{
type:"line",
data:{
labels:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
datasets:[{
label:"Traffic",
data:[120,300,500,400,800,900,1000],
borderColor:"#06b6d4"
}]
}
});

/* PIE CHART */
new Chart(document.getElementById("pieChart"),{
type:"pie",
data:{
labels:["Morobe","NCD","Madang","Hela","ENB"],
datasets:[{
data:[30,25,15,20,10]
}]
}
});

/* BAR CHART */
new Chart(document.getElementById("barChart"),{
type:"bar",
data:{
labels:["Users","Sessions","Blocked","Alerts"],
datasets:[{
label:"System Load",
data:[5240,320,12940,18],
backgroundColor:"#06b6d4"
}]
}
});

</script>

</body>
</html>
