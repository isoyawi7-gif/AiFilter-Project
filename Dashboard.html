<body>

<!-- LOGIN PAGE -->
<div id="loginPage">

    <div class="login-box">
        <h1>PROJECT PNG INTERNET FILTER</h1>

        <input type="text" id="username" placeholder="Username">
        <br><br>

        <input type="password" id="password" placeholder="Password">
        <br><br>

        <button onclick="login()">Login</button>

        <p id="error" style="color:red;display:none;">
            Invalid Username or Password
        </p>
    </div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="logo">PNG AI Dashboard</div>

        <ul>
            <li onclick="showHome()"><i class="fas fa-chart-line"></i> Dashboard</li>
            <li onclick="showSearch()"><i class="fas fa-search"></i> Search Trends</li>
            <li><i class="fas fa-users"></i> Users</li>
            <li><i class="fas fa-map"></i> Provinces</li>
            <li><i class="fas fa-brain"></i> AI</li>

            <li onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </li>
        </ul>

    </div>

    <!-- YOUR EXISTING DASHBOARD CONTENT HERE -->

</div>

<script>

/* CHECK SESSION */

if(sessionStorage.getItem("loggedIn") === "true"){
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
}

/* LOGIN */

function login(){

    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "Admin" && pass === "Admin"){

        sessionStorage.setItem("loggedIn","true");

        document.getElementById("loginPage").style.display = "none";
        document.getElementById("dashboard").style.display = "block";

    }
    else{

        document.getElementById("error").style.display = "block";

    }

}

/* LOGOUT */

function logout(){

    if(confirm("Logout?")){

        sessionStorage.clear();

        document.getElementById("dashboard").style.display = "none";
        document.getElementById("loginPage").style.display = "flex";

    }

}

/* EXISTING FUNCTIONS */

function showSearch(){
document.getElementById("homeSection").style.display="none";
document.getElementById("searchSection").style.display="block";
}

function showHome(){
document.getElementById("homeSection").style.display="block";
document.getElementById("searchSection").style.display="none";
}

</script>

</body>
